<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#b0f5b4">
  <meta name="description" content="パンダさんパワー反射神経ゲーム">

  <!-- PWA: ホーム画面追加対応 -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS Safari 対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="パンダパワー">
  <link rel="apple-touch-icon" href="images/icon-192.png">

  <title>パンダさんパワー!!</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      background-color: #b0f5b4;
      font-family: sans-serif;
      touch-action: manipulation;
    }

    /* ゲーム画面：ビューポートにぴったり収める */
    #gameScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      overflow: hidden;
    }

    /* 結果画面：内容が長ければスクロール可能 */
    #resultScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 32px 16px;
      text-align: center;
    }

    h1 { font-size: clamp(2em, 8vw, 3.5em); margin: 10px 0; text-align: center; }
    #timer { font-size: clamp(1.4em, 5vw, 2.2em); margin: 8px; }
    #question { font-size: clamp(2em, 8vw, 3em); margin: 20px 0; }

    .btn {
      font-size: clamp(1.6em, 6vw, 2.6em);
      margin: 10px;
      padding: clamp(18px, 3.5vw, 28px) clamp(28px, 7vw, 46px);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn:active { opacity: 0.75; transform: scale(0.96); }
    #powerBtn { background-color: #f28b82; }
    #sanBtn { background-color: #a7c7e7; }
    #score { font-size: clamp(1.2em, 4vw, 1.8em); margin-top: 10px; }

    #buttonContainer {
      display: flex;
      justify-content: center;
      gap: clamp(10px, 4vw, 30px);
      flex-wrap: wrap;
      margin: 12px 0;
    }

    .start-btn {
      font-size: clamp(1.8em, 6vw, 2.8em);
      padding: 16px 48px;
      margin-top: 20px;
      background-color: #ffffffee;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .start-btn:active { opacity: 0.75; transform: scale(0.97); }

    #resultTitle { font-size: clamp(1.8em, 6vw, 2.8em); margin-bottom: 10px; }
    #finalScore { font-size: clamp(1.4em, 5vw, 2.2em); margin-bottom: 8px; }
    #rank { font-size: clamp(1.1em, 4vw, 1.8em); color: #333; margin-bottom: 12px; }

    #rankImage {
      width: 65%;
      max-width: 260px;
      margin: 12px 0;
      display: none;
      border-radius: 12px;
    }

    .retry-btn {
      font-size: clamp(1.3em, 4.5vw, 2.2em);
      padding: 16px 40px;
      margin: 10px 0;
      background-color: #ffffff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      width: 80%;
    }
    .retry-btn:active { opacity: 0.75; transform: scale(0.97); }

    #shareBtn {
      margin-top: 8px;
      font-size: clamp(1.1em, 4vw, 1.8em);
      padding: 14px 28px;
      background-color: #1da1f2;
      color: white;
      width: 80%;
    }

    #timer.danger { color: #e53935; }
    #timer.warning { color: #f57c00; }
  </style>
</head>
<body>
  <div id="gameScreen">
    <h1>パンダさんパワー!!</h1>
    <div id="timer">残り: 60秒</div>
    <div id="question">スタートを押してね！</div>
    <div id="buttonContainer">
      <button class="btn" id="powerBtn" disabled>パワー</button>
      <button class="btn" id="sanBtn" disabled>さん</button>
    </div>
    <br>
    <button class="start-btn" onclick="startGame()">スタート</button>
    <div id="score"></div>
  </div>

  <div id="resultScreen">
    <div id="resultTitle">ゲーム終了！</div>
    <div id="finalScore"></div>
    <div id="rank"></div>
    <img id="rankImage" src="" alt="ランク画像">
    <br>
    <button class="retry-btn" onclick="startGame()">もう一回！</button>
    <br>
    <button id="shareBtn" class="btn" onclick="shareOnX()">Xでシェア</button>
  </div>

  <script>
    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    const words = ["パンダ", "パンダさん"];
    let currentWord = "";
    let score = 0;
    let timeLeft = 60;
    let timerInterval = null;
    let gameActive = false;
    let imageUrl = "";

    const question = document.getElementById("question");
    const scoreDisplay = document.getElementById("score");
    const powerBtn = document.getElementById("powerBtn");
    const sanBtn = document.getElementById("sanBtn");
    const timerDisplay = document.getElementById("timer");
    const resultScreen = document.getElementById("resultScreen");
    const finalScore = document.getElementById("finalScore");
    const rank = document.getElementById("rank");
    const rankImage = document.getElementById("rankImage");

    function startGame() {
      score = 0;
      timeLeft = 60;
      gameActive = true;
      document.getElementById("gameScreen").style.display = "flex";
      resultScreen.style.display = "none";
      rankImage.style.display = "none";
      scoreDisplay.textContent = "";
      timerDisplay.textContent = `残り: ${timeLeft}秒`;
      timerDisplay.className = "";
      powerBtn.disabled = false;
      sanBtn.disabled = false;
      startTimer();
      nextWord();
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = `残り: ${timeLeft}秒`;
        timerDisplay.className = timeLeft <= 10 ? "danger" : timeLeft <= 20 ? "warning" : "";
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          endGame();
        }
      }, 1000);
    }

    function nextWord() {
      currentWord = words[Math.floor(Math.random() * words.length)];
      question.textContent = currentWord;
    }

    function handleAnswer(answer) {
      if (!gameActive) return;
      const isCorrect =
        (currentWord === "パンダ" && answer === "さん") ||
        (currentWord === "パンダさん" && answer === "パワー");

      if (isCorrect) {
        score++;
        scoreDisplay.textContent = `スコア: ${score}`;
        nextWord();
      } else {
        endGame(true);
      }
    }

    function endGame(wasMistake = false) {
      gameActive = false;
      clearInterval(timerInterval);
      powerBtn.disabled = true;
      sanBtn.disabled = true;
      question.textContent = wasMistake ? "ミス！" : "時間切れ！";
      finalScore.textContent = `最終スコア: ${score}`;
      rank.textContent = getRankMessage(score);

      if (score >= 60) {
        imageUrl = "https://fuyutosan.github.io/pandasangame/images/rank_4.png";
      } else if (score >= 40) {
        imageUrl = "https://fuyutosan.github.io/pandasangame/images/rank_3.png";
      } else if (score >= 20) {
        imageUrl = "https://fuyutosan.github.io/pandasangame/images/rank_2.png";
      } else {
        imageUrl = "https://fuyutosan.github.io/pandasangame/images/rank_1.png";
      }

      rankImage.src = imageUrl;
      rankImage.style.display = "block";
      document.getElementById("gameScreen").style.display = "none";
      resultScreen.style.display = "flex";
    }

    function getRankMessage(score) {
      if (score >= 60) return "パンダさんパワーMAX！めいちゃんもにっこり！";
      if (score >= 40) return "すごい集中力！パンダさんパワー全開！";
      if (score >= 20) return "いい調子！パンダさんパワー充電中！";
      return "器が小さい";
    }

    function shareOnX() {
      const text = "パンダさんパワー!!でスコア" + score + "を達成！\n" +
                   "#モーニング娘 #山﨑愛生 #パンダさんパワー #反射神経ゲーム\n\n" +
                   "▼結果画像はこちら！\n" + imageUrl + "\n\n" +
                   "▼ゲームはこちらから遊べるよ！\n" +
                   "https://fuyutosan.github.io/pandasangame/";
      const shareUrl = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text);
      window.open(shareUrl, "_blank");
    }

    powerBtn.onclick = () => handleAnswer("パワー");
    sanBtn.onclick = () => handleAnswer("さん");
  </script>
</body>
</html>
